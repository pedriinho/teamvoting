<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Adicionar Player</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center">
    <div class="bg-white p-8 rounded shadow-md w-full max-w-md">
        <h1 class="text-xl font-semibold mb-4">Adicionar Player</h1>

        {% if users_to_add %}
        <form method="post" class="flex flex-col gap-4">
            {% csrf_token %}
            <select name="username" required class="border rounded px-3 py-2 w-full">
                <option value="" disabled selected>Selecione um usuário</option>
                {% for user in users_to_add %}
                    <option value="{{ user.username }}">{{ user.username }}</option>
                {% endfor %}
            </select>
            <button type="submit" class="bg-yellow-500 hover:bg-yellow-600 text-white px-4 py-2 rounded">
                Adicionar como Player
            </button>
        </form>
        {% else %}
            <p class="text-gray-600">Todos os usuários já estão cadastrados como players.</p>
        {% endif %}

        <a href="{% url 'home' %}" class="block mt-4 text-center text-gray-600 hover:text-gray-900">Voltar</a>
    </div>
</body>
</html>
